<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Classe Pro (Cloud)</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  padding: 20px;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: #fff;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
h1 { text-align: center; }

input, select, textarea {
  padding: 8px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-family: inherit;
  box-sizing: border-box;
}

button {
  margin: 5px;
  padding: 8px 14px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover { background: #2563eb; }

.section {
  background: rgba(255, 255, 255, .08);
  border-radius: 12px;
  margin-bottom: 15px;
  padding: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}

.header {
  background: rgba(255, 255, 255, .15);
  padding: 12px 15px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.school-header {
  background: rgba(37, 99, 235, 0.3); /* Um azul um pouco mais forte para destacar a escola */
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.2s;
}
.school-header:hover { background: rgba(37, 99, 235, 0.5); }

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
  background: #fff;
  color: #000;
  border-radius: 8px;
  overflow: hidden;
}

th {
  background: #1e40af;
  color: #fff;
  padding: 8px 4px;
  font-size: 12px;
}

th, td {
  border: 1px solid #e2e8f0;
  text-align: center;
}

td { padding: 5px; cursor: pointer; transition: 0.2s; }
td:hover { background: #f1f5f9; }

.grade-input {
  width: 45px;
  text-align: center;
  border: 1px solid #cbd5e1 !important;
  background: #ffffff;
  color: #1e293b;
  font-weight: bold;
}

.day-header { cursor: pointer; padding: 4px; }
.day-header:hover { background: #2563eb; }
.day-btn {
  display: inline-block;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 4px;
  padding: 4px 6px;
  font-weight: bold;
}
.day-btn.has-note {
  background: #10b981;
  color: #fff;
  border: 1px solid #059669;
  box-shadow: 0 0 5px rgba(16, 185, 129, 0.4);
}

.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, .75);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}

.modal-content {
  background: #fff; color: #000; padding: 25px; border-radius: 10px; width: 420px; max-width: 90%;
}

.support-section {
  margin-top: auto; 
  padding-top: 40px;
  padding-bottom: 20px;
  text-align: center;
}
.support-btn {
  background: #009ee3; 
  color: #fff;
  padding: 12px 24px;
  font-size: 16px;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
  box-shadow: 0 4px 15px rgba(0, 158, 227, 0.4);
  transition: 0.3s;
}
.support-btn:hover {
  background: #008cc9;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 158, 227, 0.6);
}

#syncStatus {
  display: block;
  font-size: 14px;
  margin-top: 10px;
  height: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>📘 Diário de Classe Pro</h1>

<div style="text-align: center; margin-bottom: 10px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;">
  <input id="schoolInput" placeholder="🏫 Nome da escola" onkeypress="if(event.key === 'Enter') addSchool()" style="width: 250px;">
  <button onclick="addSchool()">➕ Escola</button>
  <button onclick="manualSave()" style="background: #10b981;">☁️ Sincronizar Tudo</button>
</div>
<div style="text-align: center; margin-bottom: 20px;">
  <span id="syncStatus" style="color: #cbd5e1;"></span>
</div>

<div id="schools"></div>

<div class="support-section">
  <p style="color: #cbd5e1; font-size: 14px; margin-bottom: 12px;">Gostou do aplicativo? Ajude a manter este projeto vivo! ❤️</p>
  <a href="https://mpago.la/25RuJm4" target="_blank" style="text-decoration: none;">
    <button class="support-btn">🤝 Contribuir com R$ 4,90</button>
  </a>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
  <div class="modal-content">
    <h3 id="modalTitle" style="color: #1e40af; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0;">Resumo da Aula</h3>
    <textarea id="noteText" placeholder="Descreva o conteúdo ensinado neste dia..." style="width: 100%; height: 120px; margin-bottom: 15px; border: 1px solid #cbd5e1;"></textarea>
    <div style="display: flex; justify-content: flex-end; gap: 10px;">
      <button onclick="closeModal()" style="background: #ef4444; margin: 0;">Cancelar</button>
      <button onclick="saveNote()" style="background: #10b981; margin: 0;">Salvar Relatório</button>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyvJkShNc1A2Rc9QVnQ2yPxZfyHSOUZHSDNqGwBaEcn0Y2r-7tVDyrpikqXrzCITb2Skg/exec';
const BACKUP_KEY = 'diario_pro_backup';

let schools = [];
let openState = {};
let currentNote = {};

function setStatus(msg, color = "#10b981") {
  const el = document.getElementById('syncStatus');
  if(!el) return;
  el.innerText = msg;
  el.style.color = color;
  if(msg.includes("✅") || msg.includes("❌")) {
    setTimeout(() => { el.innerText = ""; }, 4000);
  }
}

async function save(showAlert = false) {
  localStorage.setItem(BACKUP_KEY, JSON.stringify(schools));
  setStatus("🔄 Salvando na nuvem...", "#f59e0b");
  
  try {
    await fetch(WEB_APP_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8",
      },
      body: JSON.stringify({ action: "save", content: schools })
    });
    setStatus("✅ Salvo na nuvem com sucesso!", "#10b981");
    if(showAlert) alert("✔️ Dados sincronizados com sucesso!");
  } catch(e) {
    setStatus("❌ Erro de conexão. Salvo neste aparelho.", "#ef4444");
    if(showAlert) alert("Sem conexão. Dados salvos offline neste aparelho.");
  }
}

function manualSave() { save(true); }

async function load() {
  setStatus("🔄 Puxando dados da nuvem...", "#3b82f6");
  try {
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8",
      },
      body: JSON.stringify({ action: "load" })
    });
    const data = await response.json();
    if (Array.isArray(data)) {
      schools = data;
      localStorage.setItem(BACKUP_KEY, JSON.stringify(schools));
      setStatus("✅ Dados carregados!", "#10b981");
    }
  } catch(e) {
    setStatus("⚠️ Modo Offline (Mostrando últimos dados salvos)", "#f59e0b");
    const d = localStorage.getItem(BACKUP_KEY);
    if (d) schools = JSON.parse(d);
  }
  render();
}

function addSchool() {
  const n = document.getElementById('schoolInput').value;
  if (!n.trim()) return;
  schools.push({ name: n.trim(), classes: [] });
  document.getElementById('schoolInput').value = '';
  // Abre a escola automaticamente ao criá-la
  openState[`school-${schools.length - 1}`] = true;
  render(); save();
}

function addClass(s) {
  const n = prompt('Nome da turma:');
  if (!n) return;
  schools[s].classes.push({
    name: n.trim(), students: [], subjects: [], notes: {},
    month: new Date().getMonth(), year: new Date().getFullYear()
  });
  // Abre a turma automaticamente ao criá-la
  openState[`${s}-${schools[s].classes.length - 1}`] = true;
  render(); save();
}

function addSubject(s, c) {
  const n = prompt('Nome da Disciplina:');
  if (!n || !n.trim()) return;
  schools[s].classes[c].subjects.push(n.trim());
  render(); save();
}

function addStudents(s, c) {
  const input = prompt('Digite os alunos (um por linha):');
  if (!input) return;
  const names = input.split(/\n|,|;/).map(n => n.trim()).filter(Boolean);
  names.forEach(n => {
    schools[s].classes[c].students.push({ name: n, absences: {}, grades: {} });
  });
  render(); save();
}

function editStudentName(s, c, i) {
  const currentName = schools[s].classes[c].students[i].name;
  const newName = prompt('Editar nome:', currentName);
  if (newName !== null && newName.trim() !== '') {
    schools[s].classes[c].students[i].name = newName.trim();
    render(); save();
  }
}

function updateGrade(s, c, studentIdx, subject, value) {
  schools[s].classes[c].students[studentIdx].grades[subject] = value.replace(',', '.');
  save(); 
}

function toggleAbsence(s, c, i, d) {
  const cls = schools[s].classes[c];
  if(cls.month === null) return;
  const st = cls.students[i];
  if (!st.absences[cls.month]) st.absences[cls.month] = {};
  st.absences[cls.month][d] = !st.absences[cls.month][d];
  render(); save(); 
}

function toggleOpen(key) {
  openState[key] = !openState[key];
  render();
}

function getDays(m, y) { return new Date(y, m + 1, 0).getDate(); }

function openModal(s, c, d) {
  currentNote = { s, c, d };
  const note = schools[s].classes[c].notes[d] || {};
  document.getElementById('modalTitle').innerText = `📝 Relatório - Dia ${d}`;
  document.getElementById('noteText').value = note.text || '';
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('noteText').focus();
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveNote() {
  const { s, c, d } = currentNote;
  const text = document.getElementById('noteText').value.trim();
  if (!schools[s].classes[c].notes) schools[s].classes[c].notes = {};
  if (text === '') delete schools[s].classes[c].notes[d];
  else schools[s].classes[c].notes[d] = { text: text };
  closeModal(); render(); save(); 
}

function exportFullReport(s, c) {
  const school = schools[s];
  const cls = school.classes[c];
  const m = cls.month;
  const mesFormatado = m !== null ? (m+1).toString().padStart(2, '0') : '--';
  
  let html = `<html><head><title>Boletim - ${cls.name}</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f0f0f0; }
    .name { text-align: left; font-weight: bold; white-space: nowrap; }
    .btn-imprimir { background: #1e40af; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; }
    @media print { .btn-imprimir { display: none; } body { padding: 0; } }
  </style></head><body>
  <button class=\"btn-imprimir\" onclick=\"window.print()\">🖨️ Imprimir</button>
  <h2>${school.name}</h2>
  <h3>Relatório - Turma: <b>${cls.name}</b></h3>
  <p>Mês: ${mesFormatado}/${cls.year}</p>
  <table>
    <thead>
      <tr>
        <th class="name">Aluno</th>
        <th>Faltas</th>
        ${cls.subjects.map(sub => `<th>${sub}</th>`).join('')}
      </tr>
    </thead>
    <tbody>`;

  cls.students.forEach(st => {
    let tf = 0;
    if (st.absences[m]) tf = Object.values(st.absences[m]).filter(v => v).length;
    html += `<tr>
      <td class="name">${st.name}</td>
      <td style="color:${tf > 0 ? 'red' : 'black'}; font-weight:bold;">${tf}</td>
      ${cls.subjects.map(sub => `<td>${st.grades[sub] || '-'}</td>`).join('')}
    </tr>`;
  });

  html += `</tbody></table></body></html>`;
  const w = window.open('', '_blank');
  if(w) { w.document.write(html); w.document.close(); }
}

function render() {
  const div = document.getElementById('schools');
  div.innerHTML = '';

  schools.forEach((school, s) => {
    const sDiv = document.createElement('div');
    sDiv.className = 'section';
    
    // Controle de minimizar da Escola (por padrão começam abertas se for undefined)
    const schoolKey = `school-${s}`;
    let isSchoolOpen = openState[schoolKey];
    if (isSchoolOpen === undefined) isSchoolOpen = true; 

    // Cabecalho da escola clicável
    sDiv.innerHTML = `<div class='school-header' style="margin-bottom: ${isSchoolOpen ? '15px' : '0'};" onclick="openState['${schoolKey}'] = ${!isSchoolOpen}; render();">
      <h2 style="margin:0;">🏫 ${school.name}</h2>
      <div>
        <button onclick="event.stopPropagation(); addClass(${s})" style="background:#475569;">➕ Turma</button>
        <span style="margin-left: 10px; font-size: 1.2em;">${isSchoolOpen ? '🔽' : '▶️'}</span>
      </div>
    </div>`;

    // Só mostra as turmas se a escola estiver aberta
    if (isSchoolOpen) {
      school.classes.forEach((cls, c) => {
        const key = `${s}-${c}`;
        const isOpen = openState[key];
        const cDiv = document.createElement('div');
        cDiv.className = 'section';
        cDiv.style.background = 'rgba(0,0,0,0.15)';

        let html = `<div class='header' onclick="toggleOpen('${key}')">
          <span style="font-weight:bold;">📚 Turma: ${cls.name}</span>
          <span>${isOpen ? '🔽' : '▶️'}</span>
        </div>`;

        if (isOpen) {
          html += `<div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
            <select onchange="schools[${s}].classes[${c}].month=Number(this.value);render();save();">`;
            const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
            for(let i=0; i<12; i++) html += `<option value="${i}" ${i==cls.month?'selected':''}>${meses[i]}</option>`;
          html += `</select>
            <button onclick="addSubject(${s},${c})" style="background:#8b5cf6;">➕ Disciplina</button>
            <button onclick="addStudents(${s},${c})" style="background:#0ea5e9;">👨‍🎓 Alunos</button>
            <button onclick="exportFullReport(${s},${c})" style="background:#f59e0b;">📊 Imprimir</button>
          </div>`;

          if (cls.students.length > 0) {
            const days = getDays(cls.month, cls.year);
            html += `<div style="overflow-x:auto; margin-top:15px;"><table><thead><tr>
              <th rowspan="2" style="min-width: 150px; text-align:left; padding-left:10px;">Alunos</th>
              <th colspan="${days}">Frequência Diária</th>
              <th colspan="${cls.subjects.length || 1}" style="background:#334155;">Disciplinas</th>
            </tr><tr>`;
            for(let d=1; d<=days; d++) {
              const hn = cls.notes && cls.notes[d] ? 'has-note' : '';
              html += `<th class="day-header" onclick="openModal(${s},${c},${d})"><span class="day-btn ${hn}">${d}</span></th>`;
            }
            cls.subjects.forEach(sub => html += `<th style="background:#475569;">${sub}</th>`);
            if (cls.subjects.length === 0) html += `<th style="background:#475569;">-</th>`;
            html += `</tr></thead><tbody>`;

            cls.students.forEach((st, i) => {
              html += `<tr><td style="text-align:left; padding-left:10px;" onclick="editStudentName(${s}, ${c}, ${i})">
                  <b>${st.name}</b> <span style="opacity:0.2;font-size:10px;">✏️</span>
                </td>`;
              for(let d=1; d<=days; d++) {
                const f = st.absences?.[cls.month]?.[d];
                html += `<td onclick="toggleAbsence(${s},${c},${i},${d})" style="color:${f?'red':'inherit'};font-weight:${f?'bold':'normal'}">${f?'F':''}</td>`;
              }
              cls.subjects.forEach(sub => {
                html += `<td style="background:#f1f5f9;"><input type="text" class="grade-input" value="${st.grades[sub] || ''}" onchange="updateGrade(${s},${c},${i},'${sub}',this.value)"></td>`;
              });
              if (cls.subjects.length === 0) html += `<td style="background:#f1f5f9;">-</td>`;
              html += `</tr>`;
            });
            html += `</tbody></table></div>`;
          }
        }
        cDiv.innerHTML = html;
        sDiv.appendChild(cDiv);
      });
    }
    div.appendChild(sDiv);
  });
}

load();
</script>
</body>
</html>
